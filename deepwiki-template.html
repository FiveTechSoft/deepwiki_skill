<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{REPO_NAME}} — DeepWiki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
    <style>
        /* ═══════════════════════════════════════════
           CSS RESET & ROOT TOKENS
           ═══════════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            /* Background layers */
            --bg-base:       #0d1117;
            --bg-surface:    #161b22;
            --bg-overlay:    #1c2129;
            --bg-inset:      #010409;
            --bg-hover:      #1c2129;
            --bg-active:     #262c36;

            /* Borders */
            --border-default:  #30363d;
            --border-muted:    #21262d;
            --border-subtle:   #1b2028;

            /* Text */
            --text-primary:    #e6edf3;
            --text-secondary:  #8b949e;
            --text-tertiary:   #6e7681;
            --text-link:       #58a6ff;
            --text-accent:     #79c0ff;

            /* Accent */
            --accent-primary:  #1f6feb;
            --accent-hover:    #388bfd;
            --accent-subtle:   rgba(56,139,253,0.1);
            --accent-green:    #3fb950;
            --accent-green-subtle: rgba(63,185,80,0.1);

            /* Sizes */
            --sidebar-width:   280px;
            --toc-width:       220px;
            --content-max:     820px;
            --header-height:   48px;

            /* Fonts */
            --font-sans:  'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono:  'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;

            /* Transitions */
            --transition-fast: 150ms ease;
            --transition-normal: 250ms ease;
        }

        html { font-size: 15px; scroll-behavior: smooth; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ═══════════════════════════════════════════
           TOP HEADER BAR
           ═══════════════════════════════════════════ */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--header-height);
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-default);
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 1000;
            gap: 16px;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.93rem;
            white-space: nowrap;
        }

        .header-logo svg {
            width: 20px; height: 20px;
            fill: var(--accent-green);
        }

        .header-breadcrumb {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.87rem;
            color: var(--text-secondary);
        }
        .header-breadcrumb a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color var(--transition-fast);
        }
        .header-breadcrumb a:hover { color: var(--text-primary); }
        .header-breadcrumb .sep { color: var(--text-tertiary); }

        .header-tabs {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 24px;
        }

        .header-tab {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all var(--transition-fast);
            cursor: pointer;
        }
        .header-tab:hover { background: var(--bg-hover); color: var(--text-primary); }
        .header-tab.active {
            background: var(--accent-subtle);
            color: var(--text-link);
        }
        .header-tab svg { width: 14px; height: 14px; }

        .header-actions {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-overlay);
            border: 1px solid var(--border-default);
            border-radius: 8px;
            padding: 4px 12px;
            gap: 6px;
            transition: border-color var(--transition-fast);
            cursor: text;
        }
        .search-box:focus-within { border-color: var(--accent-primary); }
        .search-box svg { width: 14px; height: 14px; color: var(--text-tertiary); flex-shrink: 0; }
        .search-box input {
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 0.82rem;
            font-family: var(--font-sans);
            width: 180px;
        }
        .search-box input::placeholder { color: var(--text-tertiary); }

        /* ═══════════════════════════════════════════
           LAYOUT: 3-COLUMN
           ═══════════════════════════════════════════ */
        .layout {
            display: flex;
            margin-top: var(--header-height);
            min-height: calc(100vh - var(--header-height));
        }

        /* ─── LEFT SIDEBAR ─── */
        .sidebar {
            position: fixed;
            top: var(--header-height);
            left: 0;
            bottom: 0;
            width: var(--sidebar-width);
            background: var(--bg-surface);
            border-right: 1px solid var(--border-default);
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px 0;
            z-index: 100;
            scrollbar-width: thin;
            scrollbar-color: var(--border-default) transparent;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 4px; }

        /* Nav tree */
        .nav-section {
            margin-bottom: 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 6px 16px 6px 16px;
            font-size: 0.87rem;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            transition: all var(--transition-fast);
            border-left: 2px solid transparent;
            gap: 8px;
            user-select: none;
            line-height: 1.4;
        }
        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .nav-item.active {
            color: var(--text-link);
            border-left-color: var(--accent-primary);
            background: var(--accent-subtle);
            font-weight: 500;
        }

        .nav-item .nav-icon {
            width: 16px; height: 16px;
            flex-shrink: 0;
            color: var(--text-tertiary);
        }
        .nav-item.active .nav-icon { color: var(--text-link); }

        .nav-item .nav-chevron {
            width: 14px; height: 14px;
            flex-shrink: 0;
            color: var(--text-tertiary);
            transition: transform var(--transition-fast);
            margin-left: auto;
        }
        .nav-item.expanded .nav-chevron { transform: rotate(90deg); }

        .nav-children {
            overflow: hidden;
            max-height: 0;
            transition: max-height var(--transition-normal);
        }
        .nav-children.open { max-height: 2000px; }

        .nav-children .nav-item {
            padding-left: 40px;
            font-size: 0.83rem;
        }
        .nav-children .nav-children .nav-item {
            padding-left: 56px;
            font-size: 0.8rem;
        }

        .nav-back {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px 12px;
            font-size: 0.82rem;
            color: var(--text-link);
            cursor: pointer;
            border-bottom: 1px solid var(--border-muted);
            margin-bottom: 8px;
        }
        .nav-back svg { width: 14px; height: 14px; }

        /* ─── MAIN CONTENT ─── */
        .main {
            flex: 1;
            margin-left: var(--sidebar-width);
            margin-right: var(--toc-width);
            padding: 40px 48px 80px;
            max-width: calc(100% - var(--sidebar-width) - var(--toc-width));
            min-height: calc(100vh - var(--header-height));
        }

        .content {
            max-width: var(--content-max);
            margin: 0 auto;
        }

        /* ─── RIGHT TOC SIDEBAR ─── */
        .toc-sidebar {
            position: fixed;
            top: var(--header-height);
            right: 0;
            bottom: 0;
            width: var(--toc-width);
            padding: 28px 16px 28px 12px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border-default) transparent;
        }
        .toc-sidebar::-webkit-scrollbar { width: 3px; }
        .toc-sidebar::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }

        .toc-title {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 12px;
        }

        .toc-link {
            display: block;
            padding: 3px 0;
            font-size: 0.8rem;
            color: var(--text-tertiary);
            text-decoration: none;
            transition: color var(--transition-fast);
            border-left: 2px solid transparent;
            padding-left: 10px;
            line-height: 1.5;
        }
        .toc-link:hover { color: var(--text-primary); }
        .toc-link.active {
            color: var(--text-link);
            border-left-color: var(--accent-primary);
        }
        .toc-link.depth-3 { padding-left: 22px; font-size: 0.77rem; }

        /* ═══════════════════════════════════════════
           CONTENT TYPOGRAPHY
           ═══════════════════════════════════════════ */
        .content h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-default);
            letter-spacing: -0.02em;
        }

        .content h2 {
            font-size: 1.45rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 40px;
            margin-bottom: 16px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border-muted);
            letter-spacing: -0.01em;
        }

        .content h3 {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 28px;
            margin-bottom: 12px;
        }

        .content h4 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-top: 20px;
            margin-bottom: 8px;
        }

        .content p {
            margin-bottom: 14px;
            color: var(--text-primary);
            line-height: 1.7;
        }

        .content a {
            color: var(--text-link);
            text-decoration: none;
            transition: color var(--transition-fast);
        }
        .content a:hover { color: var(--accent-hover); text-decoration: underline; }

        .content strong { font-weight: 600; color: var(--text-primary); }
        .content em { font-style: italic; }

        .content ul, .content ol {
            margin-bottom: 14px;
            padding-left: 24px;
        }
        .content li {
            margin-bottom: 6px;
            line-height: 1.6;
        }
        .content li::marker { color: var(--text-tertiary); }

        /* Inline code */
        .content code:not(pre code) {
            background: var(--bg-overlay);
            border: 1px solid var(--border-muted);
            border-radius: 5px;
            padding: 2px 6px;
            font-family: var(--font-mono);
            font-size: 0.87em;
            color: var(--text-accent);
        }

        /* Code blocks */
        .content pre {
            background: var(--bg-inset);
            border: 1px solid var(--border-default);
            border-radius: 8px;
            padding: 16px 20px;
            overflow-x: auto;
            margin-bottom: 18px;
            position: relative;
        }
        .content pre code {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            line-height: 1.55;
            color: var(--text-primary);
            background: none;
            border: none;
            padding: 0;
        }

        /* Copy button on code blocks */
        .code-block-wrapper {
            position: relative;
        }
        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--bg-overlay);
            border: 1px solid var(--border-default);
            border-radius: 5px;
            color: var(--text-tertiary);
            padding: 4px 8px;
            font-size: 0.72rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity var(--transition-fast), background var(--transition-fast);
        }
        .code-block-wrapper:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { background: var(--bg-active); color: var(--text-primary); }

        /* Tables */
        .content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 18px;
            font-size: 0.9rem;
        }
        .content thead th {
            background: var(--bg-overlay);
            text-align: left;
            padding: 10px 14px;
            font-weight: 600;
            color: var(--text-primary);
            border-bottom: 2px solid var(--border-default);
            font-size: 0.85rem;
        }
        .content tbody td {
            padding: 9px 14px;
            border-bottom: 1px solid var(--border-muted);
            color: var(--text-secondary);
        }
        .content tbody tr:hover { background: var(--bg-hover); }

        /* Blockquotes (used for "Relevant source files") */
        .content blockquote {
            border-left: 3px solid var(--accent-primary);
            background: var(--accent-subtle);
            padding: 12px 16px;
            margin-bottom: 18px;
            border-radius: 0 6px 6px 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .content blockquote code {
            font-size: 0.83em;
        }

        /* Source files box (special) */
        .source-files-box {
            background: var(--bg-overlay);
            border: 1px solid var(--border-default);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.87rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: background var(--transition-fast);
        }
        .source-files-box:hover { background: var(--bg-active); }
        .source-files-box .icon { color: var(--text-tertiary); flex-shrink: 0; }
        .source-files-box .chevron { margin-left: auto; color: var(--text-tertiary); }
        .source-files-list {
            display: none;
            padding: 8px 0 4px 24px;
            font-size: 0.83rem;
        }
        .source-files-box.open + .source-files-list { display: block; }
        .source-file-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 3px 0;
            color: var(--text-link);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.82rem;
        }
        .source-file-item:hover { text-decoration: underline; }

        /* Mermaid diagrams */
        .mermaid {
            background: var(--bg-inset);
            border: 1px solid var(--border-default);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 18px;
            text-align: center;
            overflow-x: auto;
        }

        /* Horizontal rule / page divider */
        .content hr {
            border: none;
            border-top: 1px solid var(--border-default);
            margin: 40px 0;
        }

        /* "Ask DeepWiki" floating button */
        .ask-deepwiki-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent-green);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(63,185,80,0.3);
            transition: transform var(--transition-fast), box-shadow var(--transition-fast);
            z-index: 999;
        }
        .ask-deepwiki-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 24px rgba(63,185,80,0.4);
        }
        .ask-deepwiki-btn svg { width: 22px; height: 22px; fill: white; }

        /* Model selector chip */
        .model-selector {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-overlay);
            border: 1px solid var(--border-default);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.78rem;
            color: var(--text-secondary);
            cursor: pointer;
            z-index: 999;
        }
        .model-selector svg { width: 14px; height: 14px; }

        /* ═══════════════════════════════════════════
           PAGE SECTIONS (multi-page navigation)
           ═══════════════════════════════════════════ */
        .wiki-page {
            display: none;
        }
        .wiki-page.active {
            display: block;
        }

        /* ═══════════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════════ */
        @media (max-width: 1200px) {
            .toc-sidebar { display: none; }
            .main { margin-right: 0; max-width: calc(100% - var(--sidebar-width)); }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform var(--transition-normal);
                z-index: 500;
            }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; max-width: 100%; padding: 24px 20px 60px; }
            .header-tabs { display: none; }
            .mobile-menu-btn { display: flex !important; }
        }

        .mobile-menu-btn {
            display: none;
            align-items: center;
            justify-content: center;
            width: 32px; height: 32px;
            background: none;
            border: 1px solid var(--border-default);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        /* ═══════════════════════════════════════════
           ANIMATIONS
           ═══════════════════════════════════════════ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .content { animation: fadeIn 0.3s ease; }

        /* ═══════════════════════════════════════════
           SCROLLBAR for main
           ═══════════════════════════════════════════ */
        .main::-webkit-scrollbar { width: 6px; }
        .main::-webkit-scrollbar-track { background: transparent; }
        .main::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 4px; }

        /* Print styles */
        @media print {
            .header, .sidebar, .toc-sidebar, .ask-deepwiki-btn, .model-selector { display: none !important; }
            .main { margin: 0; max-width: 100%; padding: 20px; }
        }
    </style>
</head>
<body>

    <!-- ════════════ HEADER BAR ════════════ -->
    <header class="header">
        <button class="mobile-menu-btn" onclick="toggleSidebar()" aria-label="Menu">
            <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1 2.75A.75.75 0 0 1 1.75 2h12.5a.75.75 0 0 1 0 1.5H1.75A.75.75 0 0 1 1 2.75Zm0 5A.75.75 0 0 1 1.75 7h12.5a.75.75 0 0 1 0 1.5H1.75A.75.75 0 0 1 1 7.75ZM1.75 12h12.5a.75.75 0 0 1 0 1.5H1.75a.75.75 0 0 1 0-1.5Z"/></svg>
        </button>

        <a class="header-logo" href="#">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-5" stroke="white" stroke-width="2" fill="none"/></svg>
            {{REPO_OWNER}}
        </a>

        <div class="header-breadcrumb">
            <span class="sep">›</span>
            <a href="#">DeepWiki</a>
            <span class="sep">›</span>
            <a href="#">{{REPO_OWNER}}/{{REPO_NAME}}</a>
        </div>

        <div class="header-tabs">
            <a class="header-tab" onclick="showPanel('sessions')">
                <svg viewBox="0 0 16 16" fill="currentColor"><path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v9.5A1.75 1.75 0 0 1 14.25 13H8.06l-2.573 2.573A1.458 1.458 0 0 1 3 14.543V13H1.75A1.75 1.75 0 0 1 0 11.25Zm1.75-.25a.25.25 0 0 0-.25.25v9.5c0 .138.112.25.25.25h2a.75.75 0 0 1 .75.75v2.19l2.72-2.72a.749.749 0 0 1 .53-.22h6.5a.25.25 0 0 0 .25-.25v-9.5a.25.25 0 0 0-.25-.25Z"/></svg>
                Sessions
            </a>
            <a class="header-tab" onclick="showPanel('ask')">
                <svg viewBox="0 0 16 16" fill="currentColor"><path d="M5.933.87a2.89 2.89 0 0 1 4.134 0l5.063 5.197a2.89 2.89 0 0 1 0 4.066l-5.063 5.197a2.89 2.89 0 0 1-4.134 0L.87 10.133a2.89 2.89 0 0 1 0-4.066ZM8 5.5a.75.75 0 0 0-.75.75v2.5a.75.75 0 0 0 1.5 0v-2.5A.75.75 0 0 0 8 5.5Zm0 6.25a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z"/></svg>
                Ask
            </a>
            <a class="header-tab active" onclick="showPanel('wiki')">
                <svg viewBox="0 0 16 16" fill="currentColor"><path d="M0 1.75A.75.75 0 0 1 .75 1h4.253c1.227 0 2.317.59 3 1.501A3.743 3.743 0 0 1 11.006 1h4.245a.75.75 0 0 1 .75.75v10.5a.75.75 0 0 1-.75.75h-4.507a2.25 2.25 0 0 0-1.591.659l-.622.621a.75.75 0 0 1-1.06 0l-.622-.621A2.25 2.25 0 0 0 5.258 13H.75a.75.75 0 0 1-.75-.75Zm7.251 10.324.004-5.073-.002-2.253A2.25 2.25 0 0 0 5.003 2.5H1.5v9h3.757a3.75 3.75 0 0 1 1.994.574ZM8.755 4.75l-.004 7.322a3.752 3.752 0 0 1 1.992-.572H14.5v-9h-3.495a2.25 2.25 0 0 0-2.25 2.25Z"/></svg>
                Wiki
            </a>
            <a class="header-tab" onclick="showPanel('review')">
                <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3.5 12a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 0 1H4a.5.5 0 0 1-.5-.5Zm0-4a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 0 1H4a.5.5 0 0 1-.5-.5Zm0-4a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 0 1H4a.5.5 0 0 1-.5-.5Z"/></svg>
                Review
            </a>
        </div>

        <div class="header-actions">
            <div class="search-box">
                <svg viewBox="0 0 16 16" fill="currentColor"><path d="M10.68 11.74a6 6 0 0 1-7.922-8.982 6 6 0 0 1 8.982 7.922l3.04 3.04a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215ZM11.5 7a4.499 4.499 0 1 0-8.997 0A4.499 4.499 0 0 0 11.5 7Z"/></svg>
                <input type="text" placeholder="Search..." id="searchInput" onkeyup="handleSearch(event)">
            </div>
        </div>
    </header>

    <!-- ════════════ LEFT SIDEBAR ════════════ -->
    <div class="layout">
        <nav class="sidebar" id="sidebar">
            {{NAV_ITEMS}}
        </nav>

        <!-- ════════════ MAIN CONTENT ════════════ -->
        <main class="main">
            <div class="content" id="mainContent">
                {{PAGE_CONTENT}}
            </div>
        </main>

        <!-- ════════════ RIGHT TOC SIDEBAR ════════════ -->
        <aside class="toc-sidebar" id="tocSidebar">
            <div class="toc-title">On this page</div>
            {{TOC_ITEMS}}
        </aside>
    </div>

    <!-- ════════════ FLOATING ELEMENTS ════════════ -->
    <div class="model-selector">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="3"/></svg>
        Auto
        <svg viewBox="0 0 16 16" fill="currentColor" style="width:10px;height:10px"><path d="m4.427 7.427 3.396 3.396a.25.25 0 0 0 .354 0l3.396-3.396A.25.25 0 0 0 11.396 7H4.604a.25.25 0 0 0-.177.427Z"/></svg>
    </div>

    <button class="ask-deepwiki-btn" title="Ask DeepWiki about this repo">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
    </button>

    <!-- ════════════ SCRIPTS ════════════ -->
    <script>
        // ── Mermaid init ──
        mermaid.initialize({
            startOnLoad: true,
            theme: 'dark',
            themeVariables: {
                darkMode: true,
                background: '#0d1117',
                primaryColor: '#1f6feb',
                primaryTextColor: '#e6edf3',
                primaryBorderColor: '#30363d',
                lineColor: '#8b949e',
                secondaryColor: '#161b22',
                tertiaryColor: '#1c2129',
                fontFamily: 'Inter, sans-serif',
                fontSize: '13px'
            },
            flowchart: { curve: 'monotoneX', padding: 12 },
            sequence: { actorFontSize: '13px', messageFontSize: '12px' }
        });

        // ── Syntax highlighting ──
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('pre code').forEach(block => {
                hljs.highlightElement(block);
            });
            wrapCodeBlocks();
            buildTocFromContent();
            activateFirstPage();
        });

        // ── Wrap code blocks with copy button ──
        function wrapCodeBlocks() {
            document.querySelectorAll('.content pre').forEach(pre => {
                if (pre.parentElement.classList.contains('code-block-wrapper')) return;
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(pre);

                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.textContent = 'Copy';
                btn.onclick = () => {
                    const code = pre.querySelector('code') || pre;
                    navigator.clipboard.writeText(code.textContent).then(() => {
                        btn.textContent = 'Copied!';
                        setTimeout(() => btn.textContent = 'Copy', 1500);
                    });
                };
                wrapper.appendChild(btn);
            });
        }

        // ── Build TOC from h2/h3 in active content ──
        function buildTocFromContent() {
            const toc = document.getElementById('tocSidebar');
            if (!toc) return;
            const titleEl = toc.querySelector('.toc-title');
            // Clear existing dynamic links
            toc.querySelectorAll('.toc-link').forEach(l => l.remove());

            const headings = document.querySelectorAll('.wiki-page.active h2, .wiki-page.active h3');
            headings.forEach((h, i) => {
                if (!h.id) h.id = 'section-' + i;
                const a = document.createElement('a');
                a.className = 'toc-link' + (h.tagName === 'H3' ? ' depth-3' : '');
                a.href = '#' + h.id;
                a.textContent = h.textContent;
                toc.appendChild(a);
            });

            // Scroll spy
            if (headings.length > 0) {
                const tocLinks = toc.querySelectorAll('.toc-link');
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            tocLinks.forEach(l => l.classList.remove('active'));
                            const active = toc.querySelector(`a[href="#${entry.target.id}"]`);
                            if (active) active.classList.add('active');
                        }
                    });
                }, { rootMargin: '-80px 0px -70% 0px' });
                headings.forEach(h => observer.observe(h));
            }
        }

        // ── Sidebar navigation ──
        function toggleNavSection(el) {
            el.classList.toggle('expanded');
            const children = el.nextElementSibling;
            if (children && children.classList.contains('nav-children')) {
                children.classList.toggle('open');
            }
        }

        function navigateTo(pageId) {
            // Hide all pages
            document.querySelectorAll('.wiki-page').forEach(p => p.classList.remove('active'));
            // Show target
            const target = document.getElementById(pageId);
            if (target) target.classList.add('active');

            // Update nav active state
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const navItem = document.querySelector(`.nav-item[data-page="${pageId}"]`);
            if (navItem) navItem.classList.add('active');

            // Re-highlight code
            document.querySelectorAll('.wiki-page.active pre code').forEach(block => {
                hljs.highlightElement(block);
            });
            wrapCodeBlocks();
            buildTocFromContent();

            // Scroll to top
            document.querySelector('.main').scrollTo(0, 0);

            // Close mobile sidebar
            document.getElementById('sidebar').classList.remove('open');
        }

        function activateFirstPage() {
            const first = document.querySelector('.wiki-page');
            if (first) {
                first.classList.add('active');
                const firstNav = document.querySelector('.nav-item[data-page]');
                if (firstNav) firstNav.classList.add('active');
            }
        }

        // ── Mobile sidebar toggle ──
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // ── Source files toggle ──
        function toggleSourceFiles(el) {
            el.classList.toggle('open');
        }

        // ── Search ──
        function handleSearch(e) {
            const query = e.target.value.toLowerCase().trim();
            if (!query) return;
            if (e.key === 'Enter') {
                // Simple search: find first matching heading
                const headings = document.querySelectorAll('h1, h2, h3, h4');
                for (const h of headings) {
                    if (h.textContent.toLowerCase().includes(query)) {
                        // Find parent page
                        const page = h.closest('.wiki-page');
                        if (page) navigateTo(page.id);
                        setTimeout(() => h.scrollIntoView({ behavior: 'smooth', block: 'center' }), 200);
                        // Flash highlight
                        h.style.background = 'rgba(56,139,253,0.2)';
                        h.style.borderRadius = '4px';
                        h.style.transition = 'background 0.5s';
                        setTimeout(() => h.style.background = '', 2000);
                        break;
                    }
                }
            }
        }

        // ── Panels (stub) ──
        function showPanel(name) {
            document.querySelectorAll('.header-tab').forEach(t => t.classList.remove('active'));
            event.target.closest('.header-tab').classList.add('active');
        }
    </script>
</body>
</html>
